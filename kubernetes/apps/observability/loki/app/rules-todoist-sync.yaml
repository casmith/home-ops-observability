---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-rules
  namespace: observability
data:
  todoist-sync.yaml: |
    groups:
      - name: todoist-sync
        interval: 1m
        rules:
          - alert: TodoistSyncTodoistServerError
            expr: |
              sum(
                count_over_time(
                  {namespace="default", container="app", pod=~"sync-todoist-to-habitica-.*"}
                  |= "Sync finished"
                  [5m]
                )
              ) > 0
            # Temporary: shorten so we can validate end-to-end quickly
            for: 2m
            labels:
              severity: warning
              app: sync-todoist-to-habitica
            annotations:
              summary: "Todoist sync: Todoist 5xx errors for > 1h"
              description: |
                The Todoist sync job is repeatedly logging TODOIST_SERVER_ERROR (Todoist 5xx).
                This alert only fires when the error pattern has been continuously present for over 1 hour.

          - alert: TodoistSyncFatalError
            expr: |
              sum(
                count_over_time(
                  {namespace="default", container="app", pod=~"sync-todoist-to-habitica-.*"}
                  |= "Sync finished"
                  [5m]
                )
              ) > 0
            for: 0m
            labels:
              severity: critical
              app: sync-todoist-to-habitica
            annotations:
              summary: "Todoist sync: fatal error"
              description: |
                The Todoist sync job logged SYNC_FATAL_ERROR (non-retriable / fatal).
                This should be investigated immediately.
