---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-rules
  namespace: observability
data:
  todoist-sync.yaml: |
    groups:
      - name: todoist-sync
        interval: 1m
        rules:
          - alert: TodoistSyncTodoistServerError
            expr: |
              sum(
                count_over_time(
                  {namespace="default", container="app", pod=~"sync-todoist-to-habitica-.*"}
                  |= "TODOIST_SERVER_ERROR"
                  [1h]
                )
              ) > 5
            for: 10m
            labels:
              severity: warning
              app: sync-todoist-to-habitica
            annotations:
              summary: "Todoist sync: recurring Todoist 5xx errors"
              description: |
                The Todoist sync job logged TODOIST_SERVER_ERROR more than 5 times in the last hour
                (sustained for 10 minutes).

          - alert: TodoistSyncFatalError
            expr: |
              sum(
                count_over_time(
                  {namespace="default", container="app", pod=~"sync-todoist-to-habitica-.*"}
                  |= "SYNC_FATAL_ERROR"
                  [5m]
                )
              ) > 0
            for: 0m
            labels:
              severity: critical
              app: sync-todoist-to-habitica
            annotations:
              summary: "Todoist sync: fatal error"
              description: |
                The Todoist sync job logged SYNC_FATAL_ERROR (non-retriable / fatal).
                This should be investigated immediately.
