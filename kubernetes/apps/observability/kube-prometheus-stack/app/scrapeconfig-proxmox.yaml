---
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: proxmox-node-exporter
  namespace: observability
spec:
  staticConfigs:
    - targets: ["192.168.10.11:9100"]
      labels:
        instance: pve1
        cluster: proxmox
    - targets: ["192.168.10.9:9100"]
      labels:
        instance: pve2
        cluster: proxmox
    - targets: ["192.168.10.12:9100"]
      labels:
        instance: pve3
        cluster: proxmox
    - targets: ["192.168.10.13:9100"]
      labels:
        instance: pve4
        cluster: proxmox
    - targets: ["192.168.10.8:9100"]
      labels:
        instance: pve5
        cluster: proxmox
  # Override the auto-generated job name (scrapeConfig/observability/proxmox-node-exporter)
  relabelings:
    - targetLabel: job
      replacement: proxmox-nodes
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: proxmox-pve-exporter
  namespace: observability
spec:
  metricsPath: /pve
  # pve-exporter returns cluster-wide metrics regardless of target, so one
  # scrape against any cluster member is enough. The exporter still requires
  # a target param to know which API endpoint to dial.
  params:
    module: ["default"]
    target: ["pve1"]
  staticConfigs:
    - targets: ["192.168.10.11:9221"]
  relabelings:
    - targetLabel: cluster
      replacement: proxmox
    - targetLabel: job
      replacement: proxmox-pve
    - targetLabel: instance
      replacement: pve-cluster
