---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: observability
spec:
  interval: 1h
  chart:
    spec:
      chart: app-template
      version: 3.7.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      uptime-kuma:
        strategy: Recreate
        containers:
          app:
            image:
              repository: docker.io/louislam/uptime-kuma
              tag: 2.2.1
            env:
              TZ: UTC
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - curl
                      - -sf
                      - http://localhost:3001/api/health
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 5
                  failureThreshold: 30
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - curl
                      - -sf
                      - http://localhost:3001/api/health
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
                add: ["NET_RAW"]
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1024
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: uptime-kuma
        ports:
          http:
            port: 3001
    persistence:
      data:
        type: nfs
        server: 192.168.10.3
        path: /volume1/cluster/uptime-kuma
        globalMounts:
          - path: /app/data
